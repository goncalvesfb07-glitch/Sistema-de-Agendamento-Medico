<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Agendamento Médico</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="left">

        <div class="logo">
            <i class="fa-solid fa-hospital"></i>
        </div>

        <h1>Clínica Vida+</h1>

        <p>
            Sistema de Agendamento Médico
        </p>

    </div>

    <div class="right">

        <form id="loginForm">

            <h2>Login</h2>

            <div class="inputBox">

                <i class="fa-solid fa-user"></i>

                <input
                type="text"
                placeholder="Usuário"
                required>

            </div>

            <div class="inputBox">

                <i class="fa-solid fa-lock"></i>

                <input
                type="password"
                placeholder="Senha"
                required>

            </div>

            <select id="perfil">

                <option value="">Selecione o Perfil</option>

                <option value="medico">
                    Médico
                </option>

                <option value="recepcionista">
                    Recepcionista
                </option>

                <option value="paciente">
                    Paciente
                </option>

            </select>

            <button type="submit">
                Entrar
            </button>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
