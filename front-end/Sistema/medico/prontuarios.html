<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prontuário Médico</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<body>

<div class="sidebar">

        <i class="fa-solid fa-hospital"></i>

        <h2>Vida+</h2>

    </div>

    <ul>

        <li><i class="fa-solid fa-house"></i> Dashboard</li>

        <li><i class="fa-solid fa-calendar-days"></i> Agenda</li>

        <li><i class="fa-solid fa-users"></i> Pacientes</li>

        <li class="active">
            <i class="fa-solid fa-file-medical"></i>
            Prontuários
        </li>

        <li><i class="fa-solid fa-clock-rotate-left"></i> Histórico</li>

        <li><i class="fa-solid fa-user-doctor"></i> Perfil</li>

    </ul>

</div>



<div class="main">

<header>

<h1>Prontuário do Paciente</h1>

</header>



<div class="paciente">

<div class="foto">

<i class="fa-solid fa-circle-user"></i>

</div>

<div>

<h2>Maria Oliveira</h2>

<p>32 anos</p>

<p>Convênio: Unimed</p>

<p>Tipo Sanguíneo: O+</p>

<p>Telefone: (11)99999-9999</p>

</div>

</div>



<div class="formulario">

<div class="campo">

<label>Queixa Principal</label>

<textarea></textarea>

</div>



<div class="campo">

<label>Diagnóstico</label>

<textarea></textarea>

</div>



<div class="campo">

<label>Prescrição Médica</label>

<textarea></textarea>

</div>



<div class="campo">

<label>Solicitação de Exames</label>

<textarea></textarea>

</div>



<div class="campo">

<label>Observações</label>

<textarea></textarea>

</div>



<div class="botoes">

<button class="btnSalvar">

Salvar

</button>

<button class="btnFinalizar">

Finalizar Atendimento

</button>

</div>

</div>

</div>

</body>

</html>
